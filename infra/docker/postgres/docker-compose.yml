services:
  postgres:
    image: postgres:16
    container_name: fiscal_platform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fiscal_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - fiscal_platform_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fiscal_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fiscal_platform_postgres_data: